<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>悬浮时钟</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app">
      <div id="clock" class="clock"></div>
      <div id="alarm-indicator" class="alarm-indicator"></div>

      <div id="alarm-panel" class="alarm-panel hidden">
        <div class="alarm-header">
          <span>闹钟</span>
          <button id="close-alarm" class="icon-btn">×</button>
        </div>
        <div id="alarm-list" class="alarm-list"></div>
        <div id="alarm-form" class="alarm-form hidden">
          <input type="time" id="alarm-time" required />
          <input type="text" id="alarm-label" placeholder="标签" maxlength="10" />
          <div class="form-actions">
            <button id="cancel-alarm">取消</button>
            <button id="save-alarm">保存</button>
          </div>
        </div>
        <button id="add-alarm-btn" class="add-btn">+ 添加闹钟</button>
      </div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
